<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веб-копилка — Автономный контент-сервис</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0914;       
            --card-bg: #21135c;        
            --text-main: #ffffff;      
            --text-muted: #8e8a9f;    
            --border-color: #211c38;   
            --accent-purple: #4e32c2;  
            --accent-green: #00ffcc;
            --input-bg: #130f2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .offline-badge {
            display: inline-block;
            background-color: rgba(0, 255, 204, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .editor-section {
            background-color: #0e0c1b;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .editor-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"], textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background-color: var(--accent-purple);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .cards-section h2 {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .purple-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .purple-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #fff;
            padding-right: 24px;
        }

        .purple-card .date {
            font-size: 11px;
            color: var(--accent-green);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .purple-card p {
            font-size: 14px;
            color: #d1cee2;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            flex-grow: 1;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
            line-height: 1;
        }

        .delete-btn:hover {
            color: #ff5555;
        }

        .empty-state {
            grid-column: 1 / -1;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Веб-копилка</h1>
        <p>Проект студента Коптева Михаила • Группа Вдо-12</p>
        <div class="offline-badge">Концепция Offline First Активна</div>
    </header>

    <main>
        <section class="editor-section">
            <h2>Добавить новую запись (статью или код)</h2>
            <div class="form-group">
                <label for="titleInput">Заголовок</label>
                <input type="text" id="titleInput" placeholder="Введите название темы...">
            </div>
            <div class="form-group">
                <label for="contentInput">Текст конспекта / фрагмент кода</label>
                <textarea id="contentInput" placeholder="Вставьте или напишите сюда любой контент..."></textarea>
            </div>
            <button class="btn" onclick="saveData()">Сохранить локально</button>
        </section>

        <section class="cards-section">
            <h2>Сохраненный контент в LocalStorage</h2>
            <div id="cardsGrid" class="grid">
                <!-- Карточки будут добавляться динамически -->
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderInterface();
        });

        function saveData() {
            const titleInput = document.getElementById('titleInput');
            const contentInput = document.getElementById('contentInput');

            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title || !content) {
                alert('Пожалуйста, заполните оба поля!');
                return;
            }

            const now = new Date();
            const formattedDate = now.toLocaleDateString('ru-RU') + ' в ' + now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
            
            const newItem = {
                id: Date.now(),
                title: title,
                content: content,
                date: formattedDate
            };

            let existingData = localStorage.getItem('web_buffer_data');
            let dataArray = existingData ? JSON.parse(existingData) : [];
            
            dataArray.unshift(newItem);
            localStorage.setItem('web_buffer_data', JSON.stringify(dataArray));

            titleInput.value = '';
            contentInput.value = '';

            renderInterface();
        }

        function renderInterface() {
            const cardsGrid = document.getElementById('cardsGrid');
            cardsGrid.innerHTML = '';

            const rawData = localStorage.getItem('web_buffer_data');
            const dataArray = rawData ? JSON.parse(rawData) : [];

            if (dataArray.length === 0) {
                cardsGrid.innerHTML = `<div class="empty-state">Копилка пуста. Добавьте первую запись выше, данные мгновенно сохранятся в памяти браузера.</div>`;
                return;
            }

            dataArray.forEach(item => {
                const card = document.createElement('div');
                card.className = 'purple-card';
                card.innerHTML = `
                    <div>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">×</button>
                        <h3>${escapeHtml(item.title)}</h3>
                        <div class="date">${item.date}</div>
                        <p>${escapeHtml(item.content)}</p>
                    </div>
                `;
                cardsGrid.appendChild(card);
            });
        }

        function deleteItem(id) {
            if (!confirm('Удалить эту запись из локальной памяти?')) return;

            const rawData = localStorage.getItem('web_buffer_data');
            let dataArray = rawData ? JSON.parse(rawData) : [];

            dataArray = dataArray.filter(item => item.id !== id);
            localStorage.setItem('web_buffer_data', JSON.stringify(dataArray));

            renderInterface();
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
    </script>
</body>
</html>
